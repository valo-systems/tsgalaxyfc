<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="TS Galaxy FC official badge">
  <title>TS Galaxy FC</title>
  <defs>
    <clipPath id="badgeClip">
      <circle cx="50" cy="50" r="44"/>
    </clipPath>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E01A00"/>
      <stop offset="100%" stop-color="#990D00"/>
    </radialGradient>
  </defs>

  <!-- Outer dark border ring -->
  <circle cx="50" cy="50" r="49.5" fill="#111111"/>

  <!-- Main red background with radial gradient depth -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)"/>

  <!-- White accent ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="white" stroke-width="1.8"/>

  <!-- Gold inner accent ring -->
  <circle cx="50" cy="50" r="42.5" fill="none" stroke="#F59E0B" stroke-width="1"/>

  <!-- Top dark band for text readability -->
  <rect x="0" y="0" width="100" height="28" fill="#6B0505" opacity="0.75" clip-path="url(#badgeClip)"/>

  <!-- Bottom dark band for text readability -->
  <rect x="0" y="74" width="100" height="26" fill="#6B0505" opacity="0.75" clip-path="url(#badgeClip)"/>

  <!-- Gold separator lines -->
  <line x1="16" y1="28" x2="84" y2="28" stroke="#F59E0B" stroke-width="0.8" opacity="0.9"/>
  <line x1="16" y1="74" x2="84" y2="74" stroke="#F59E0B" stroke-width="0.8" opacity="0.9"/>

  <!-- TS GALAXY text at top -->
  <text x="50" y="21"
        text-anchor="middle"
        fill="white"
        font-family="'Arial Black', 'Arial', Impact, sans-serif"
        font-size="9.5"
        font-weight="900"
        letter-spacing="2">TS GALAXY</text>

  <!-- THE ROCKETS text at bottom -->
  <text x="50" y="86"
        text-anchor="middle"
        fill="#FCD34D"
        font-family="'Arial Black', 'Arial', Impact, sans-serif"
        font-size="7.5"
        font-weight="900"
        letter-spacing="1.2">THE ROCKETS</text>

  <!-- === ROCKET === -->

  <!-- Nose cone -->
  <polygon points="50,31  43,44  57,44" fill="white"/>

  <!-- Body capsule -->
  <rect x="43" y="43.5" width="14" height="19" rx="7" fill="white"/>

  <!-- Porthole window -->
  <circle cx="50" cy="51.5" r="4" fill="#CC1100"/>
  <circle cx="50" cy="51.5" r="2.5" fill="#FF5555"/>

  <!-- Left fin (gold) -->
  <polygon points="43,56  33,68  43,62" fill="#F59E0B"/>

  <!-- Right fin (gold) -->
  <polygon points="57,56  67,68  57,62" fill="#F59E0B"/>

  <!-- Exhaust flame outer (gold) -->
  <path d="M 45,62.5 Q 47.5,75 50,69 Q 52.5,75 55,62.5 Z" fill="#F59E0B"/>

  <!-- Exhaust flame inner (white/pale) -->
  <path d="M 47,63 Q 49,71 50,67 Q 51,71 53,63 Z" fill="#FEF9C3" opacity="0.95"/>

  <!-- === STARS === -->
  <!-- Left 5-pt star -->
  <polygon points="26,44.5 27.3,40.5 28.6,44.5 24.8,42 30.2,42" fill="#F59E0B"/>
  <!-- Right 5-pt star -->
  <polygon points="74,44.5 75.3,40.5 76.6,44.5 72.8,42 78.2,42" fill="#F59E0B"/>

  <!-- Small accent dots flanking body -->
  <circle cx="21" cy="52" r="1.6" fill="#F59E0B" opacity="0.55"/>
  <circle cx="79" cy="52" r="1.6" fill="#F59E0B" opacity="0.55"/>
</svg>
