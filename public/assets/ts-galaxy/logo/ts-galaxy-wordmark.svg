<?xml version="1.0" encoding="UTF-8"?>
<!--
  TS Galaxy FC – Horizontal Wordmark
  Badge on left, text on right.
  Optimised for footer / wide header use.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" role="img" aria-label="TS Galaxy FC – The Rockets">
  <title>TS Galaxy FC – The Rockets</title>
  <defs>
    <radialGradient id="wmBadgeBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E01A00"/>
      <stop offset="100%" stop-color="#990D00"/>
    </radialGradient>
    <clipPath id="wmClip">
      <circle cx="30" cy="30" r="27"/>
    </clipPath>
  </defs>

  <!-- === BADGE (60×60 area, circle centred at 30,30) === -->

  <!-- Outer ring -->
  <circle cx="30" cy="30" r="29.5" fill="#111111"/>
  <!-- Red background -->
  <circle cx="30" cy="30" r="27.5" fill="url(#wmBadgeBg)"/>
  <!-- White ring -->
  <circle cx="30" cy="30" r="27.5" fill="none" stroke="white" stroke-width="1.2"/>
  <!-- Gold ring -->
  <circle cx="30" cy="30" r="25.5" fill="none" stroke="#F59E0B" stroke-width="0.7"/>

  <!-- Top dark band -->
  <rect x="3" y="3" width="54" height="16" fill="#6B0505" opacity="0.75" clip-path="url(#wmClip)"/>
  <!-- Bottom dark band -->
  <rect x="3" y="44" width="54" height="13" fill="#6B0505" opacity="0.75" clip-path="url(#wmClip)"/>

  <!-- Top separator line -->
  <line x1="9" y1="18" x2="51" y2="18" stroke="#F59E0B" stroke-width="0.5" opacity="0.9"/>
  <!-- Bottom separator line -->
  <line x1="9" y1="44" x2="51" y2="44" stroke="#F59E0B" stroke-width="0.5" opacity="0.9"/>

  <!-- TS GALAXY mini text -->
  <text x="30" y="13.5"
        text-anchor="middle"
        fill="white"
        font-family="'Arial Black','Arial',Impact,sans-serif"
        font-size="5.8"
        font-weight="900"
        letter-spacing="1.2">TS GALAXY</text>

  <!-- THE ROCKETS mini text -->
  <text x="30" y="51.5"
        text-anchor="middle"
        fill="#FCD34D"
        font-family="'Arial Black','Arial',Impact,sans-serif"
        font-size="4.5"
        font-weight="900"
        letter-spacing="0.7">THE ROCKETS</text>

  <!-- Rocket nose -->
  <polygon points="30,19.5  25.5,26  34.5,26" fill="white"/>
  <!-- Rocket body -->
  <rect x="25.5" y="25.5" width="9" height="12" rx="4.5" fill="white"/>
  <!-- Window -->
  <circle cx="30" cy="30.5" r="2.5" fill="#CC1100"/>
  <circle cx="30" cy="30.5" r="1.5" fill="#FF5555"/>
  <!-- Left fin -->
  <polygon points="25.5,34  20,41  25.5,38" fill="#F59E0B"/>
  <!-- Right fin -->
  <polygon points="34.5,34  40,41  34.5,38" fill="#F59E0B"/>
  <!-- Flame -->
  <path d="M 27.5,37.5 Q 30,44 32.5,37.5 Q 31,41 30,39.5 Q 29,41 27.5,37.5 Z" fill="#F59E0B"/>

  <!-- Stars -->
  <polygon points="16,28 16.8,25.5 17.6,28 15.2,26.5 18.4,26.5" fill="#F59E0B"/>
  <polygon points="44,28 44.8,25.5 45.6,28 43.2,26.5 46.4,26.5" fill="#F59E0B"/>

  <!-- === TEXT AREA === -->

  <!-- "TS Galaxy FC" -->
  <text x="70" y="26"
        fill="white"
        font-family="'Arial Black','Arial',Impact,sans-serif"
        font-size="18"
        font-weight="900"
        letter-spacing="0.5">TS Galaxy FC</text>

  <!-- "The Rockets" tagline -->
  <text x="71" y="42"
        fill="#F59E0B"
        font-family="Arial,sans-serif"
        font-size="11"
        font-weight="600"
        letter-spacing="2">THE ROCKETS</text>

  <!-- Accent line under tagline -->
  <line x1="71" y1="46" x2="200" y2="46" stroke="#F59E0B" stroke-width="0.8" opacity="0.5"/>
</svg>
